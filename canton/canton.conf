canton {
  # In-memory single-node setup for local development and hackathon demos.
  # For multi-party privacy demos, each "participant" would be a separate process.

  domains {
    lex_domain {
      storage.type = memory
      public-api.port = 5018
      admin-api.port  = 5019
    }
  }

  participants {
    participant1 {
      storage.type    = memory
      admin-api.port  = 5012
      ledger-api.port = 5011

      init.ledger-api.max-deduplication-duration = 30s

      parameters {
        # Enable confidential transactions (Canton-specific)
        enable-preview-commands = yes
      }
    }
  }
}
